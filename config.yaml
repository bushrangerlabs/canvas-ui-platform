name: Canvas UI Platform
version: "0.1.85"
slug: canvas_ui_platform
description: >-
  Standalone display management platform — drag-and-drop canvas editor,
  multi-device management, and kiosk display client for Linux and Android.
url: https://github.com/bushrangerlabs/canvas-ui-platform
arch:
  - aarch64
  - amd64
  - armv7
ports:
  3100/tcp: 3100
ports_description:
  3100/tcp: Canvas UI Platform API & Web UI
options:
  jwt_secret: ""
  log_level: warn
schema:
  jwt_secret: str?
  log_level: list(trace|debug|info|warn|error)
map:
  - data
startup: application
boot: auto
ingress: true
ingress_port: 3100
panel_icon: mdi:monitor-dashboard
panel_title: Canvas UI
homeassistant_api: true
